	<!DOCTYPE html>
	<html lang="fr">
		<head>
			<meta charset="utf-8">
			<title>Les Bonnes Pièces</title>
			<link rel="stylesheet" href="styles.css">
			<script type="module" src="pieces.js"></script>
		</head>
		<body>
			<header>
				<img src="images/logo-les-bonnes-pieces.png" alt="LOGO">
				<h1>Les Bonnes Pièces</h1>
			</header>
			<main>
				<!-- Menu de recherche -->
				<section class="filtres">
					<h3>Filtres</h3>
					
					<button class="btn-trier">Trier par prix croissant</button>
					<br>
					<button class="btn-filtrer">Filtrer les pièces non abordables</button>
					<br>
					<button class="btn-detrier">Trier par prix decroissant</button>
					<br>
					<button class="btn-descrop">Filtrer les pièces sans descriptions </button>
					<br><br>
					
					<br>
					<form>
						<label>Tries par prix :</label><br><br>
						<input type="range" id="Rangeprices" min="0" max="200" step="5" value="0"/>
						<label class="valuety">0€</label>
					</form>
				</section>

				<!-- Fiches produits -->
				<section class="fiches">
					
				</section>
			</main>
		</body>
	</html>
